[AccessTransformers]
; UFGAmmoType.mDamageTypesOnImpact is private; the subsystem reads/writes it to
; scale our laser ammo's impact damage per Mk level. The class-level Friend grant
; covers all its protected/private members. (UFGDamageType.mDamageAmount is public,
; so it needs no grant.)
Friend=(Class="UFGAmmoType", FriendClass="ALaserRifleSubsystem")
; UFGUnlockInfoOnly.mUnlockName/Description/Icon* are protected; the schematic base writes
; them on a stock BP_UnlockInfoOnly instance so the MAM card renders a description row.
Friend=(Class="UFGUnlockInfoOnly", FriendClass="ULaserRifleSchematic_Base")
;
; Add more Friend=(Class="<FGClass>", FriendClass="ALaserRifleSubsystem") entries
; here as needed. The build script re-syncs this Config folder to the Mods tree.
